services:
  db:
    image: pgvector/pgvector:pg15
    container_name: eleicao-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eleicoes2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eleicoes2026"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: eleicao-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/eleicoes2026
      - LLM_PROVIDER=${LLM_PROVIDER}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - DATAJUD_API_KEY=${DATAJUD_API_KEY:-}
      - PORTAL_TRANSPARENCIA_API_KEY=${PORTAL_TRANSPARENCIA_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.5-flash-lite}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-hash}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - DECAY_HALF_LIFE_DAYS=${DECAY_HALF_LIFE_DAYS}
      - MONTE_CARLO_ITERATIONS=${MONTE_CARLO_ITERATIONS}
      - MONTE_CARLO_SEED=${MONTE_CARLO_SEED:-42}
      - DATA_MODE=official_live
      - PUBLIC_DEMO=false
      - ADMIN_ENABLED=true
      - CORS_ORIGINS=http://localhost:8501
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: eleicao-frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
